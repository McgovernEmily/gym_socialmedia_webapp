<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lifting-Gym</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    
    <!---The Navigation Bar-->
    <nav>
        <div>
            <a href="index.html">Lifting-Gym</a>
        </div>

        <div>
            <a href="index.html">Home</a>
            <a href="group.html">Groups</a>
            <a href="profile.html">Profile</a>
        </div>
    </nav>

    <div class="profile-container">

        <!-- LEFT SIDEBAR -->
        <section id="side-workout">
            <h2>Workout</h2>
            <p>Add your workout for today</p>
            <p>Bench: 5x5</p>
            <p>Squat: 3x8</p>
        </section>

        <!-- CENTER FEED -->
        <section id="profile-edit">

            <!-- CREATE POST -->
            <div class="profile-description">
                <h2>Profile</h2>
                <img class="profile-holder" src="images/barbell.jpg" alt="profile-holder">
                <strong>@username</strong>
            </div>

            <div class="new-prs">

                <h2>New PRs</h2>

                <h3>Bench</h3>

                <h3>Squat</h3>

                <h3>Deadlift</h3>

            </div>

            <div class="Badges">

                <h2>Badges Achieved</h2>
            </div>


        </section>

    </div>
    
</body>
</html>
