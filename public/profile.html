<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lifting-Gym</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    
    <!---The Navigation Bar-->
    <nav>
        <div>
            <a href="index.html">Lifting-Gym</a>
        </div>

        <div>
            <a href="index.html">Home</a>
            <a href="group.html">Groups</a>
            <a href="profile.html">Profile</a>
        </div>
    </nav>

    <div class="profile-container">

        <!-- LEFT SIDEBAR -->
        <section id="side-workout">
            <h2>Workout</h2>
            <p>Add your workout for today</p>

            <h3>Type (select all that apply):</h3>
            <label><input type="checkbox" value = "Chest" class="muscle">Chest</label>
            <label><input type="checkbox" value = "Back" class="muscle">Back</label>
            <label><input type="checkbox" value = "Arms" class="muscle">Arms</label>
            <label><input type="checkbox" value = "Legs" class="muscle">Legs</label>
            <label><input type="checkbox" value = "Abs" class="muscle">Abs</label>
            <label><input type="checkbox" value = "Shoulder" class="muscle">Shoulders</label>
            
            <h3>Workout Details:</h3>
            <textarea id="workout-details" placeholder="Example: Bench 3x8, Shoulder Press 3x8..."></textarea>

            <button id="save-workout">Save Workout</button>

            <h3>Today's Workout</h3>
            <p id="type-display"></p>
            <p id="workout-display"></p>

        </section>

        <!-- CENTER FEED -->
        <section id="profile-edit">

            <!-- CREATE POST -->
            <div class="profile-description">
                <h2>Profile</h2>
                <img class="profile-holder" src="images/barbell.jpg" alt="profile-holder">
                <strong>@username</strong>
            </div>
            <div class="stats">
                <h2>Stats</h2>
                <p id="total-workouts">Total Workouts: 0</p>
                <p id="streak">🔥 Streak: 0 days</p>
            </div>

            <div class="new-prs">
                <h2>Personal Records</h2>

                <label>Bench (lbs)</label>
                <input type="number" id="bench-pr">

                <label>Squat (lbs)</label>
                <input type="number" id="squat-pr">

                <label>Deadlift (lbs)</label>
                <input type="number" id="deadlift-pr">

                <button id="save-prs">Save PRs</button>

                <h3>Your PRs:</h3>
                <p id="bench-display"></p>
                <p id="squat-display"></p>
                <p id="deadlift-display"></p>
            </div>

            <div class="Badges">
                <h2>Badges Achieved</h2>
                <div id="badge-list"></div>
            </div>


        </section>

    </div>

    <script src="scripts/profile.js"></script>
    
</body>
</html>
