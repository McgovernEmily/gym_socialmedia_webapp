<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lifting-Gym</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    
    <!---The Navigation Bar-->
    <nav>
        <div>
            <a href="index.html">Lifting-Gym</a>
        </div>

        <div>
            <a href="index.html">Home</a>
            <a href="group.html">Groups</a>
            <a href="profile.html">Profile</a>
        </div>
    </nav>

    <!--The Side bar that will show the badges and Workout log-->
    <div class="container">

        <section id="side-badges">
            <h2>Profile</h2>
            <p>@username</p>

            <h3>Today's Workout</h3>
            <p id="type-display"></p>
            <p id="workout-display"></p>
        </section>


        <section id="posts">

            <div class="create-post">
                <h3>Create a Post</h3>
                <textarea id="postText" placeholder="Share what's on your mind or lift..."></textarea>
                <input id="liftType" placeholder="Lift Type (Bench, Squat, Deadlift)">
                <button id="postbutton">Post</button>
            </div>

            <div class="post-card">
                <div class="post-header">
                    <img src="images/barbell.jpg" alt="profile">
                    <strong>@lifter1</strong>
                </div>
            </div>

        </section>


        <section id="right-sidebar">
            <h2>Badges</h2>

            <div id = "badge-list"></div>

            <h2>Suggested Lifters</h2>
            <p>@strongguy</p>
            <p>@powerqueen</p>
        </section>

    </div>

    <script src="scripts/scriptindex.js"></script>
    
</body>
</html>
